version: "3.8"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: openhinotes
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/openhinotes
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production-use-a-long-random-string}
      WHISPERX_API_URL: ${WHISPERX_API_URL:-http://whisperx:8000}
      WHISPERX_MODEL: ${WHISPERX_MODEL:-large-v3}
      LLM_API_URL: ${LLM_API_URL:-http://host.docker.internal:11434/v1}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-gpt-3.5-turbo}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@openhinotes.local}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin}
      CORS_ORIGINS: "*"
    volumes:
      - uploads_data:/app/uploads
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:5173"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config

volumes:
  postgres_data:
  uploads_data:
  caddy_data:
  caddy_config:
